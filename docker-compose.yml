services:
  proxy:
    build: .
    image: agent-data-gateway:latest
    command: bun proxy/src/server.ts
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      PROXY_PORT: "8080"
      DB_PATH: /data/audit.db
    volumes:
      - audit-data:/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  dashboard:
    image: agent-data-gateway:latest
    command: bun dashboard/src/server.ts
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DASHBOARD_PORT: "3000"
      DB_PATH: /data/audit.db
    volumes:
      - audit-data:/data
    depends_on:
      proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  mock-api:
    build: .
    image: agent-data-gateway:latest
    command: bun mock-api/src/server.ts
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      MOCK_API_PORT: "8081"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8081/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  audit-data:
